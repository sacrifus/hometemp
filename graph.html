<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graphique</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #e8e8e8;
      color: #333;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      background: #f4f4f4;
      border-bottom: 1px solid #ccc;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header a.back-btn {
      text-decoration: none;
      color: #555;
      font-size: 13px;
      background: #ddd;
      border: 1px solid #bbb;
      padding: 5px 12px;
      border-radius: 3px;
      transition: background 0.15s;
    }
    header a.back-btn:hover { background: #ccc; }
    header h1 { font-size: 18px; font-weight: 600; color: #222; }

    .last-update {
      margin-left: auto;
      font-size: 11px;
      color: #888;
    }

    /* ---- Range bar ---- */
    .range-bar {
      background: #f4f4f4;
      border-bottom: 1px solid #ccc;
      padding: 8px 20px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .range-bar span { font-size: 12px; color: #666; margin-right: 4px; }
    .range-btn {
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid #bbb;
      background: #e0e0e0;
      border-radius: 3px;
      cursor: pointer;
      color: #444;
      transition: background 0.15s;
    }
    .range-btn:hover  { background: #d0d0d0; }
    .range-btn.active { background: #555; color: #fff; border-color: #444; }

    /* ---- Charts ---- */
    .charts-wrapper {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .chart-panel {
      background: #f9f9f9;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
    }

    .chart-panel-header {
      padding: 10px 16px;
      background: #efefef;
      border-bottom: 1px solid #ccc;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }
    .sensor-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
    }
    .current-temp { font-size: 24px; font-weight: 700; color: #cc3300; }
    .current-hum  { font-size: 24px; font-weight: 700; color: #2a7a2a; }
    .stat-label   { font-size: 11px; color: #888; margin-left: 2px; }

    .stat-group { display: flex; gap: 16px; margin-left: auto; flex-wrap: wrap; }
    .stat-item  {
      font-size: 11px; color: #666;
      display: flex; flex-direction: column; align-items: center;
      gap: 2px;
    }
    .stat-item strong { font-size: 13px; color: #333; }

    .chart-body { padding: 10px 12px 14px; height: 200px; position: relative; }

    /* ---- Empty state ---- */
    .no-data {
      text-align: center;
      padding: 50px 20px;
      color: #888;
      font-size: 14px;
    }
    .no-data strong { display: block; font-size: 16px; color: #555; margin-bottom: 8px; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← Retour</a>
  <h1 id="page-title">Graphique</h1>
  <span class="last-update" id="last-update"></span>
</header>

<div class="range-bar">
  <span>Période :</span>
  <button class="range-btn" data-hours="6">6h</button>
  <button class="range-btn" data-hours="12">12h</button>
  <button class="range-btn active" data-hours="48">48h</button>
  <button class="range-btn" data-hours="168">7j</button>
  <button class="range-btn" data-hours="0">Tout</button>
</div>

<div class="charts-wrapper" id="charts-wrapper"></div>

<script>
// =============================================================================
// Sensor metadata (mirrors index.html)
// =============================================================================
var SENSORS = {
  outside:    { label: 'Extérieur', hasHum: false },
  pool:       { label: 'Piscine',   hasHum: false  },
  upstairs:   { label: 'En haut',   hasHum: true  },
  downstairs: { label: 'En bas',    hasHum: true  },
  kitchen:    { label: 'Cuisine',   hasHum: true  },
  garage:     { label: 'Garage',    hasHum: true  }
};

// =============================================================================
// Parse sensor ID from URL
// =============================================================================
var params = (function() {
  var p = {}, pairs = window.location.search.slice(1).split('&');
  pairs.forEach(function(pair) {
    var kv = pair.split('=');
    if (kv[0]) p[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
  });
  return p;
})();

var sensorId = params.id || '';
var cfg      = SENSORS[sensorId];

if (cfg) {
  document.getElementById('page-title').textContent = cfg.label;
  document.title = 'Graphique — ' + cfg.label;
} else {
  document.getElementById('page-title').textContent = 'Capteur inconnu';
}

var currentHours = 48;
var chartInstances = [];

// =============================================================================
// Load + filter history from localStorage
// =============================================================================
function loadHistory(hours) {
  try {
    var raw = localStorage.getItem('sensorHistory_' + sensorId);
    if (!raw) return [];
    var all = JSON.parse(raw);
    if (!hours) return all;  // 0 = show everything
    var cutoff = Date.now() - hours * 3600000;
    return all.filter(function(p) { return p.t >= cutoff; });
  } catch(e) { return []; }
}

// =============================================================================
// Format timestamp for chart labels
// =============================================================================
function fmtLabel(ms, hours) {
  var d = new Date(ms);
  if (hours <= 24) {
    return d.toLocaleTimeString('fr-CA', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('fr-CA', { month: 'short', day: 'numeric' })
       + ' ' + d.toLocaleTimeString('fr-CA', { hour: '2-digit', minute: '2-digit' });
}

// =============================================================================
// Statistics helpers
// =============================================================================
function stats(vals) {
  if (!vals.length) return { min: null, max: null, avg: null };
  var min = vals[0], max = vals[0], sum = 0;
  vals.forEach(function(v) { if (v < min) min = v; if (v > max) max = v; sum += v; });
  return { min: min, max: max, avg: sum / vals.length };
}

// =============================================================================
// Render everything
// =============================================================================
function render(hours) {
  // Destroy previous charts
  chartInstances.forEach(function(c) { c.destroy(); });
  chartInstances = [];

  var wrapper = document.getElementById('charts-wrapper');
  wrapper.innerHTML = '';

  var points = loadHistory(hours);

  if (!points.length) {
    wrapper.innerHTML = '<div class="no-data">'
      + '<strong>Aucune donnée disponible</strong>'
      + 'Les données s\'accumulent à chaque rafraîchissement de 15 min sur la page principale.<br>'
      + 'Revenez après quelques cycles pour voir les graphiques.'
      + '</div>';
    document.getElementById('last-update').textContent = '';
    return;
  }

  // Last-update timestamp
  var lastPt  = points[points.length - 1];
  var lastDate = new Date(lastPt.t);
  document.getElementById('last-update').textContent =
    'Dernière lecture: ' + lastDate.toLocaleDateString('fr-CA', { month: 'short', day: 'numeric' })
    + ' ' + lastDate.toLocaleTimeString('fr-CA', { hour: '2-digit', minute: '2-digit' });

  var labels   = points.map(function(p) { return fmtLabel(p.t, hours); });
  var tempVals = points.map(function(p) { return p.temp; });
  var humVals  = points.map(function(p) { return p.hum; });
  var hasHum   = cfg && cfg.hasHum && humVals.some(function(v) { return v !== null; });

  var tempStats = stats(tempVals);
  var humStats  = hasHum ? stats(humVals.filter(function(v) { return v !== null; })) : null;

  // ---- Temperature panel ----
  var tempPanel = makePanelEl({
    label: cfg ? cfg.label : sensorId,
    current: lastPt.temp !== null ? lastPt.temp.toFixed(1) + ' °C' : '—',
    currentClass: 'current-temp',
    statLabel: '°C',
    statsObj: tempStats,
    canvasId: 'chart-temp'
  });
  wrapper.appendChild(tempPanel);

  var tempCtx = document.getElementById('chart-temp').getContext('2d');
  chartInstances.push(makeChart(tempCtx, labels, tempVals, {
    color: '#cc3300',
    fill: 'rgba(204,51,0,0.07)',
    unit: '°C',
    label: 'Température'
  }));

  // ---- Humidity panel ----
  if (hasHum) {
    var humPanel = makePanelEl({
      label: (cfg ? cfg.label : sensorId) + ' — Humidité',
      current: lastPt.hum !== null ? lastPt.hum.toFixed(1) + ' %' : '—',
      currentClass: 'current-hum',
      statLabel: '%',
      statsObj: humStats,
      canvasId: 'chart-hum'
    });
    wrapper.appendChild(humPanel);

    var humCtx = document.getElementById('chart-hum').getContext('2d');
    chartInstances.push(makeChart(humCtx, labels, humVals, {
      color: '#2a7a2a',
      fill: 'rgba(42,122,42,0.07)',
      unit: '%',
      label: 'Humidité'
    }));
  }
}

// =============================================================================
// DOM helpers
// =============================================================================
function makePanelEl(opts) {
  var s = opts.statsObj;
  var statsHtml = '';
  if (s && s.min !== null) {
    statsHtml = '<div class="stat-group">'
      + '<div class="stat-item"><span>Min</span><strong>' + s.min.toFixed(1) + ' ' + opts.statLabel + '</strong></div>'
      + '<div class="stat-item"><span>Moy</span><strong>' + s.avg.toFixed(1) + ' ' + opts.statLabel + '</strong></div>'
      + '<div class="stat-item"><span>Max</span><strong>' + s.max.toFixed(1) + ' ' + opts.statLabel + '</strong></div>'
      + '</div>';
  }

  var div = document.createElement('div');
  div.className = 'chart-panel';
  div.innerHTML =
    '<div class="chart-panel-header">'
      + '<span class="sensor-label">' + esc(opts.label) + '</span>'
      + '<span class="' + opts.currentClass + '">' + esc(opts.current) + '</span>'
      + statsHtml
    + '</div>'
    + '<div class="chart-body"><canvas id="' + opts.canvasId + '"></canvas></div>';
  return div;
}

function makeChart(ctx, labels, data, style) {
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: style.label,
        data: data,
        borderColor: style.color,
        backgroundColor: style.fill,
        tension: 0.3,
        pointRadius: 0,
        borderWidth: 2,
        fill: true,
        spanGaps: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(255,255,255,0.95)',
          borderColor: '#ccc',
          borderWidth: 1,
          titleColor: '#444',
          bodyColor: '#333',
          callbacks: {
            label: function(ctx) {
              var v = ctx.parsed.y;
              return v !== null ? style.label + ': ' + v.toFixed(1) + ' ' + style.unit : '';
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#888',
            font: { size: 10 },
            maxTicksLimit: 10,
            maxRotation: 0
          },
          grid: { color: 'rgba(0,0,0,0.06)' }
        },
        y: {
          ticks: {
            color: '#888',
            font: { size: 10 },
            callback: function(v) { return v.toFixed(0) + ' ' + style.unit; }
          },
          grid: { color: 'rgba(0,0,0,0.06)' }
        }
      }
    }
  });
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =============================================================================
// Range buttons
// =============================================================================
document.querySelectorAll('.range-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.range-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentHours = parseInt(btn.dataset.hours, 10);
    render(currentHours);
  });
});

// Initial render
render(currentHours);
</script>
</body>
</html>
