<script>
// =============================================================================
// Sensor definitions
// =============================================================================
var SENSORS = {
  outside:    { label: 'Extérieur', hasHum: false },
  pool:       { label: 'Piscine',   hasHum: true  },
  upstairs:   { label: 'En haut',   hasHum: true  },
  downstairs: { label: 'En bas',    hasHum: true  },
  kitchen:    { label: 'Cuisine',   hasHum: true  },
  garage:     { label: 'Garage',    hasHum: true  }
};

var WIRELESSTAG_UUIDS = {
  outside:    '0f6ff5d2-dfa2-493e-893e-c9de8e50bfb0',
  upstairs:   'c579d742-9d4d-49e2-b979-720099ea52f2',
  downstairs: '066701db-0e8e-4eac-9507-0ff1659fcb01'
};

var YOLINK_DEVICES = {
  pool:    'Pool',
  kitchen: 'Kitchen',
  garage:  'Garage'
};

var WORKER_URL = 'https://fragrant-disk-2d6f.d-e29.workers.dev';

// Keep 10 days of 15-min readings = 10 * 24 * 4 = 960 points max per sensor
var MAX_POINTS = 960;

// =============================================================================
// localStorage helpers
// =============================================================================
function saveReading(sensorId, temp, hum) {
  try {
    var key = 'sensorHistory_' + sensorId;
    var history = JSON.parse(localStorage.getItem(key) || '[]');
    history.push({ t: Date.now(), temp: parseFloat(temp.toFixed(2)), hum: hum !== null && hum !== undefined ? parseFloat(hum.toFixed(2)) : null });
    if (history.length > MAX_POINTS) history = history.slice(-MAX_POINTS);
    localStorage.setItem(key, JSON.stringify(history));
  } catch(e) { /* quota exceeded or private browsing — silently skip */ }
}

// =============================================================================
// Display helpers
// =============================================================================
function showReading(sensorId, temp, hum, time) {
  var cfg = SENSORS[sensorId];
  if (!cfg) return;
  var el = document.getElementById('output-' + sensorId);
  if (!el) return;

  var timeStr = '';
  if (time) {
    var d = (time instanceof Date) ? time : new Date(time);
    timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  var html = '<b>' + cfg.label + ': </b>'
    + '<span class="temp full">'
    + temp.toFixed(1)
    + '<span class="sup">&deg;C</span>&nbsp;&nbsp;&nbsp;</span>';

  if (hum !== null && hum !== undefined && cfg.hasHum) {
    html += 'Humidité: <b>' + hum.toFixed(1) + '%</b>';
  } else if (timeStr) {
    html += 'Mise à jour: <b>' + timeStr + '</b>';
  }

  el.innerHTML = html;
}

// =============================================================================
// WirelessTag fetching
// =============================================================================
$.ajaxSetup({
  type: 'POST',
  contentType: 'application/json; charset=utf-8',
  cache: false,
  dataType: 'json',
  xhrFields: { withCredentials: false }
});

function fetchWirelessTag(sensorId) {
  $.ajax({
    url: 'https://my.wirelesstag.net/ethLogShared.asmx/GetLatestTemperatureRawDataByUUID',
    data: JSON.stringify({ uuid: WIRELESSTAG_UUIDS[sensorId] }),
    success: function(retval) {
      var d = retval.d;
      var temp = d.temp_degC;
      // Upstairs / downstairs sensors have a +1°C calibration offset
      if (sensorId === 'upstairs' || sensorId === 'downstairs') temp += 1;
      var hum  = (d.cap !== undefined && SENSORS[sensorId].hasHum) ? d.cap : null;
      var time = new Date();  // use now as the timestamp for the stored reading

      showReading(sensorId, temp, hum, time);
      saveReading(sensorId, temp, hum);
    },
    error: function() {
      var el = document.getElementById('output-' + sensorId);
      if (el) el.innerHTML = '<b>' + SENSORS[sensorId].label + ':</b> Erreur de lecture';
    }
  });
}

fetchWirelessTag('outside');
fetchWirelessTag('upstairs');
fetchWirelessTag('downstairs');

// =============================================================================
// YoLink fetching
// =============================================================================
function yolinkApi(accessToken, body, cb) {
  $.ajax({
    url: WORKER_URL + '?action=api&token=' + encodeURIComponent(accessToken),
    type: 'POST',
    contentType: 'application/json; charset=utf-8',
    dataType: 'json',
    data: JSON.stringify(body),
    success: cb,
    error: function() { cb(null); }
  });
}

$.ajax({
  url: WORKER_URL + '?action=token',
  type: 'POST',
  contentType: 'application/x-www-form-urlencoded',
  dataType: 'json',
  success: function(tokenData) {
    var accessToken = tokenData.access_token;

    yolinkApi(accessToken, { method: 'Home.getDeviceList' }, function(retval) {
      if (!retval) {
        $.each(YOLINK_DEVICES, function(sensorId) {
          var el = document.getElementById('output-' + sensorId);
          if (el) el.innerHTML = '<b>' + SENSORS[sensorId].label + ':</b> Erreur liste appareils';
        });
        return;
      }

      var devices = retval.data.devices;

      $.each(YOLINK_DEVICES, function(sensorId, deviceName) {
        var match = null;
        $.each(devices, function(i, dev) {
          if (dev.name === deviceName) { match = dev; return false; }
        });

        if (!match) {
          var el = document.getElementById('output-' + sensorId);
          if (el) el.innerHTML = '<b>' + SENSORS[sensorId].label + ':</b> Capteur introuvable';
          return;
        }

        yolinkApi(accessToken, {
          method: 'THSensor.getState',
          targetDevice: match.deviceId,
          token: match.token
        }, function(stateRetval) {
          if (!stateRetval) {
            var el = document.getElementById('output-' + sensorId);
            if (el) el.innerHTML = '<b>' + SENSORS[sensorId].label + ':</b> Erreur de lecture';
            return;
          }
          var state = stateRetval.data.state;
          var temp  = state.temperature;
          var hum   = (state.humidity !== undefined && SENSORS[sensorId].hasHum)
                        ? state.humidity : null;

          showReading(sensorId, temp, hum, new Date());
          saveReading(sensorId, temp, hum);
        });
      });
    });
  },
  error: function() {
    $.each(YOLINK_DEVICES, function(sensorId) {
      var el = document.getElementById('output-' + sensorId);
      if (el) el.innerHTML = '<b>' + SENSORS[sensorId].label + ':</b> Erreur d\'authentification';
    });
  }
});
</script>
